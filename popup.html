<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; padding: 16px; font-family: sans-serif; }
    input { width: 100%; padding: 8px; margin: 8px 0; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #ee4d2d; color: white; border: none; cursor: pointer; border-radius: 4px; }
    #status { margin-top: 8px; font-size: 12px; color: green; }
    #error { margin-top: 8px; font-size: 12px; color: red; }
  </style>
</head>
<body>
  <h3 style="margin:0 0 12px">FollowShop</h3>
  <input type="email" id="email" placeholder="Email"/>
  <input type="password" id="password" placeholder="Password"/>
  <button id="login">Login</button>
  <div id="status"></div>
  <div id="error"></div>
  <script src="popup.js"></script>
</body>
</html>
